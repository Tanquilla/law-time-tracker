<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Учёт времени</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ---- Тема: берём цвета Telegram, с запасными значениями для обычного браузера ---- */
  :root{
    --bg:        var(--tg-theme-bg-color, #0f1115);
    --text:      var(--tg-theme-text-color, #e9ebef);
    --hint:      var(--tg-theme-hint-color, #8b919c);
    --card:      var(--tg-theme-secondary-bg-color, #1a1d24);
    --field:     var(--tg-theme-bg-color, #0f1115);
    --button:    var(--tg-theme-button-color, #4f8cff);
    --button-tx: var(--tg-theme-button-text-color, #ffffff);
    --separator: rgba(127,127,127,0.18);

    /* Семантические акценты: золото = коммерческие (оплачиваемые), бирюза = некоммерческие */
    --comm:    #e0a82e;
    --noncomm: #38b6a6;
    --danger:  #e2574c;

    --radius: 16px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    font-size: 15px;
    line-height: 1.4;
    padding: 14px 14px calc(28px + env(safe-area-inset-bottom));
    max-width: 560px;
    margin: 0 auto;
    color-scheme: light dark;
  }

  header{ display:flex; align-items:baseline; justify-content:space-between; margin: 4px 2px 16px; }
  header h1{ font-size: 19px; font-weight: 700; margin:0; letter-spacing:-0.2px; }
  .muted{ color: var(--hint); font-size: 12.5px; }

  .card{
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card h2{ font-size: 13px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color: var(--hint); margin:0 0 12px; }

  /* ---- Таймер (главный экран) ---- */
  #task{
    width:100%; border:none; outline:none;
    background: var(--field);
    color: var(--text);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: var(--ui);
    margin-bottom: 12px;
  }
  #task::placeholder{ color: var(--hint); }
  #task:focus-visible{ box-shadow: 0 0 0 2px var(--button); }

  .cat-toggle{ display:flex; gap:8px; margin-bottom: 18px; }
  .cat{
    flex:1; border:1px solid var(--separator); background:transparent; color: var(--hint);
    padding: 9px 6px; border-radius: 11px; font-size: 13.5px; font-weight:600; cursor:pointer;
    font-family: var(--ui); transition: border-color .15s, color .15s, background .15s;
  }
  .cat[data-cat="k"].active{ color:#1a1205; background: var(--comm); border-color: var(--comm); }
  .cat[data-cat="n"].active{ color:#04201c; background: var(--noncomm); border-color: var(--noncomm); }
  .cat:disabled{ opacity:.55; cursor:default; }
  .cat:focus-visible{ box-shadow: 0 0 0 2px var(--button); }

  .display{
    font-family: var(--mono);
    font-size: 52px;
    font-weight: 600;
    text-align:center;
    letter-spacing: 1px;
    margin: 6px 0 20px;
    font-variant-numeric: tabular-nums;
  }
  .display.run-k{ color: var(--comm); }
  .display.run-n{ color: var(--noncomm); }

  .controls{ display:flex; gap:10px; }
  .btn{
    flex:1; border:none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight:600;
    cursor:pointer; font-family: var(--ui); transition: opacity .12s, transform .05s;
  }
  .btn:active{ transform: scale(.98); }
  .btn:focus-visible{ outline: none; box-shadow: 0 0 0 2px var(--text); }
  .btn.primary{ background: var(--button); color: var(--button-tx); }
  .btn.danger{ background: transparent; color: var(--danger); box-shadow: inset 0 0 0 1.5px var(--danger); }
  .btn.ghost{ background: transparent; color: var(--text); box-shadow: inset 0 0 0 1px var(--separator); }
  .btn[hidden]{ display:none; }

  /* ---- Статистика ---- */
  .stat{ margin-bottom: 18px; }
  .stat:last-child{ margin-bottom: 0; }
  .stat-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 8px; }
  .stat-name{ font-size: 13px; font-weight:700; }
  .stat-sub{ color: var(--hint); font-size: 12px; }
  .row{ display:flex; align-items:center; gap:8px; margin: 5px 0 3px; font-size: 13.5px; }
  .row .tag{ width: 9px; height:9px; border-radius:3px; flex:none; }
  .tag.k{ background: var(--comm); }
  .tag.n{ background: var(--noncomm); }
  .row .label{ color: var(--hint); flex:none; width: 78px; }
  .row .val{ font-family: var(--mono); font-weight:600; font-variant-numeric: tabular-nums; }
  .row .goal{ color: var(--hint); font-size: 12px; margin-left:auto; font-family: var(--mono); }
  .bar{ height:6px; border-radius:6px; background: var(--separator); overflow:hidden; }
  .bar > i{ display:block; height:100%; width:0; border-radius:6px; transition: width .4s ease; }
  .bar.k > i{ background: var(--comm); }
  .bar.n > i{ background: var(--noncomm); }
  .bar.over > i{ background: #5bc26a; } /* перевыполнено */

  /* ---- Журнал ---- */
  #log .empty{ color: var(--hint); font-size: 14px; padding: 4px 0; }
  .entry{ display:flex; align-items:center; gap:10px; padding: 11px 0; border-bottom: 1px solid var(--separator); }
  .entry:last-child{ border-bottom:none; }
  .entry .tag{ width:9px; height:9px; border-radius:3px; flex:none; }
  .entry .task{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .entry .dur{ font-family: var(--mono); font-weight:600; font-variant-numeric: tabular-nums; }
  .entry.live .dur{ color: var(--button); }
  .entry .del{ border:none; background:transparent; color: var(--hint); font-size: 19px; line-height:1; cursor:pointer; padding: 2px 4px; }
  .entry .del:active{ color: var(--danger); }

  /* ---- Выгрузка ---- */
  .seg{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom: 10px; }
  .seg button{
    border:1px solid var(--separator); background:transparent; color: var(--hint);
    padding: 7px 12px; border-radius: 10px; font-size: 13px; font-weight:600; cursor:pointer; font-family: var(--ui);
  }
  .seg button.on{ background: var(--button); color: var(--button-tx); border-color: var(--button); }
  #report{
    width:100%; min-height: 0; height: 0; opacity:0; padding:0; border:none; overflow:hidden;
    transition: height .2s, opacity .2s, padding .2s;
    background: var(--field); color: var(--text); border-radius: 12px;
    font-family: var(--mono); font-size: 12.5px; line-height:1.55; resize: vertical; white-space: pre;
  }
  #report.show{ height: 200px; opacity:1; padding: 12px; margin: 4px 0 10px; }
  .export-actions{ display:flex; gap:8px; }
  .export-actions .btn{ font-size:14px; padding: 11px; }

  /* ---- Добавить вручную ---- */
  .manual input{ background: var(--field); color: var(--text); border:none; outline:none;
    border-radius:12px; padding:12px 14px; font-size:16px; font-family:var(--ui); }
  .manual input::placeholder{ color: var(--hint); }
  .manual input:focus-visible{ box-shadow: 0 0 0 2px var(--button); }
  .manual #m-task{ width:100%; margin-bottom:12px; }
  .manual .cat-toggle{ margin-bottom:12px; }
  .manual-row{ display:flex; gap:8px; margin-bottom:12px; }
  .manual-row #m-date{ flex:2; min-width:0; }
  .manual-row #m-h, .manual-row #m-m{ flex:1; min-width:0; text-align:center; }

  /* ---- Планер задач ---- */
  .planner #p-task{ width:100%; background: var(--field); color: var(--text); border:none; outline:none;
    border-radius:12px; padding:12px 14px; font-size:16px; font-family:var(--ui); margin-bottom:12px; }
  .planner #p-task::placeholder{ color: var(--hint); }
  .planner #p-task:focus-visible{ box-shadow: 0 0 0 2px var(--button); }
  .planner .cat-toggle{ margin-bottom:12px; }
  #plan-list{ margin-top: 14px; }
  .plan-empty{ color: var(--hint); font-size:14px; padding:4px 0; }
  .plan-item{ display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--separator); }
  .plan-item:last-child{ border-bottom:none; }
  .plan-item .tag{ width:9px; height:9px; border-radius:3px; flex:none; }
  .plan-item .task{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .plan-item .run{ border:none; background: var(--button); color: var(--button-tx); border-radius:9px;
    padding:7px 13px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--ui); flex:none; }
  .plan-item .run:disabled{ opacity:.5; cursor:default; }
  .plan-item .del{ border:none; background:transparent; color: var(--hint); font-size:19px; line-height:1; cursor:pointer; padding:2px 4px; flex:none; }
  .plan-item .del:active{ color: var(--danger); }

  /* ---- Подсказка и кликабельные строки ---- */
  .hint-line{ color: var(--hint); font-size: 12.5px; margin: -4px 0 12px; }
  .entry.tappable{ cursor: pointer; }
  .entry.tappable:active{ background: rgba(127,127,127,0.10); border-radius: 8px; }
  .entry .edit{ border:none; background:transparent; color: var(--hint); font-size: 16px; line-height:1; cursor:pointer; padding:2px 4px; flex:none; }
  .entry .edit:active{ color: var(--button); }

  /* ---- Журнал по дням ---- */
  .hist-nav{ display:flex; align-items:center; gap:8px; margin-bottom: 10px; }
  .hist-nav button{ border:1px solid var(--separator); background:transparent; color: var(--text);
    border-radius:10px; padding:9px 14px; font-size:16px; cursor:pointer; font-family:var(--ui); flex:none; }
  .hist-nav #hist-date{ flex:1; min-width:0; background: var(--field); color: var(--text); border:none;
    border-radius:10px; padding:10px 12px; font-size:15px; font-family:var(--ui); text-align:center; }
  .hist-total{ color: var(--hint); font-size: 12.5px; margin-bottom: 8px; }
  .hist-empty{ color: var(--hint); font-size:14px; padding:4px 0; }

  /* ---- Редактор записи ---- */
  .hist-edit{ padding: 12px 0; border-bottom: 1px solid var(--separator); }
  .he-input{ background: var(--field); color: var(--text); border:none; outline:none;
    border-radius:10px; padding:10px 12px; font-size:15px; font-family:var(--ui); }
  .hist-edit #he-task{ width:100%; margin-bottom:8px; }
  .cat-toggle.small{ gap:6px; margin-bottom:8px; }
  .cat-toggle.small .cat{ padding:7px 4px; font-size:12.5px; }
  .he-time{ display:flex; gap:8px; margin-bottom:8px; }
  .he-time .he-input{ flex:1; min-width:0; text-align:center; }
  .he-actions{ display:flex; gap:8px; }
  .he-actions .btn{ flex:1; padding:10px; font-size:14px; }

  footer{ text-align:center; margin-top: 8px; }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }
</style>
</head>
<body>

<header>
  <h1>Учёт времени</h1>
  <span class="muted" id="weekinfo"></span>
</header>

<!-- ТАЙМЕР -->
<section class="card">
  <input id="task" type="text" placeholder="Над чем работаете?" autocomplete="off" />
  <div class="cat-toggle" id="timer-cats">
    <button type="button" class="cat active" data-cat="k">Коммерческие</button>
    <button type="button" class="cat" data-cat="n">Некоммерческие</button>
  </div>
  <div id="display" class="display">0:00:00</div>
  <div class="controls">
    <button id="btn-start"  class="btn primary">Старт</button>
    <button id="btn-pause"  class="btn ghost" hidden>Пауза</button>
    <button id="btn-resume" class="btn primary" hidden>Продолжить</button>
    <button id="btn-stop"   class="btn danger" hidden>Стоп</button>
  </div>
</section>

<!-- СТАТИСТИКА -->
<section class="card" id="stats">
  <div class="stat">
    <div class="stat-head"><span class="stat-name">Сегодня</span></div>
    <div class="row"><span class="tag k"></span><span class="label">Коммерч.</span><span class="val" id="t-k">0:00</span><span class="goal" id="t-k-goal">/ 5:00</span></div>
    <div class="bar k" id="bar-tk"><i></i></div>
    <div class="row"><span class="tag n"></span><span class="label">Некоммерч.</span><span class="val" id="t-n">0:00</span><span class="goal">≤ 3:00</span></div>
    <div class="bar n" id="bar-tn"><i></i></div>
  </div>

  <div class="stat">
    <div class="stat-head"><span class="stat-name">Неделя</span><span class="stat-sub" id="week-range"></span></div>
    <div class="row"><span class="tag k"></span><span class="label">Коммерч.</span><span class="val" id="w-k">0:00</span></div>
    <div class="row"><span class="tag n"></span><span class="label">Некоммерч.</span><span class="val" id="w-n">0:00</span></div>
  </div>

  <div class="stat">
    <div class="stat-head"><span class="stat-name">Месяц</span><span class="stat-sub" id="month-name"></span></div>
    <div class="row"><span class="tag k"></span><span class="label">Коммерч.</span><span class="val" id="m-k">0:00</span><span class="goal" id="m-k-goal">/ 100:00</span></div>
    <div class="bar k" id="bar-mk"><i></i></div>
    <div class="row"><span class="tag n"></span><span class="label">Некоммерч.</span><span class="val" id="m-n">0:00</span></div>
  </div>
</section>

<!-- ЖУРНАЛ ЗА СЕГОДНЯ -->
<section class="card">
  <h2>Сегодня</h2>
  <p class="hint-line">Нажмите на задачу, чтобы продолжить запись времени в неё.</p>
  <div id="log"></div>
</section>

<!-- ЖУРНАЛ ПО ДНЯМ -->
<section class="card history">
  <h2>Журнал по дням</h2>
  <div class="hist-nav">
    <button id="hist-prev" aria-label="Предыдущий день">←</button>
    <input id="hist-date" type="date" />
    <button id="hist-next" aria-label="Следующий день">→</button>
  </div>
  <div class="hist-total" id="hist-total"></div>
  <div id="hist-list"></div>
</section>

<!-- ДОБАВИТЬ ВРУЧНУЮ -->
<section class="card manual">
  <h2>Добавить вручную</h2>
  <input id="m-task" type="text" placeholder="Что за задача?" autocomplete="off" />
  <div class="cat-toggle" id="manual-cats">
    <button type="button" class="cat active" data-cat="k">Коммерческие</button>
    <button type="button" class="cat" data-cat="n">Некоммерческие</button>
  </div>
  <div class="manual-row">
    <input id="m-date" type="date" />
    <input id="m-h" type="number" min="0" max="24" placeholder="ч" inputmode="numeric" />
    <input id="m-m" type="number" min="0" max="59" placeholder="мин" inputmode="numeric" />
  </div>
  <button id="btn-add-manual" class="btn primary" style="width:100%;">Добавить запись</button>
</section>

<!-- ПЛАНЕР ЗАДАЧ -->
<section class="card planner">
  <h2>Планер задач</h2>
  <input id="p-task" type="text" placeholder="Запланировать задачу" autocomplete="off" />
  <div class="cat-toggle" id="plan-cats">
    <button type="button" class="cat active" data-cat="k">Коммерческие</button>
    <button type="button" class="cat" data-cat="n">Некоммерческие</button>
  </div>
  <button id="btn-add-plan" class="btn primary" style="width:100%;">В планер</button>
  <div id="plan-list"></div>
</section>

<!-- ВЫГРУЗКА -->
<section class="card">
  <h2>Выгрузка</h2>
  <div class="seg" id="seg-period">
    <button data-p="today" class="on">Сегодня</button>
    <button data-p="week">Неделя</button>
    <button data-p="month">Месяц</button>
    <button data-p="all">Всё</button>
  </div>
  <div class="seg" id="seg-cat">
    <button data-c="all" class="on">Все</button>
    <button data-c="k">Коммерч.</button>
    <button data-c="n">Некоммерч.</button>
  </div>
  <button id="btn-report" class="btn primary" style="width:100%;margin-bottom:8px;">Сформировать отчёт</button>
  <textarea id="report" readonly></textarea>
  <div class="export-actions" id="report-actions" hidden>
    <button id="btn-copy" class="btn primary">Скопировать</button>
    <button id="btn-share" class="btn ghost" hidden>Поделиться</button>
  </div>
</section>

<footer><span class="muted" id="storage-note"></span></footer>

<script>
"use strict";
/* ============================================================
   НАСТРОЙКИ — при желании поменяйте нормы здесь
   ============================================================ */
const NORM = {
  COMM_DAY:    5,    // коммерческих часов в день
  COMM_MONTH:  100,  // коммерческих часов в месяц
  NONCOMM_DAY: 3     // некоммерческих часов в день (мягкий потолок)
};

/* ============================================================
   Telegram + выбор хранилища
   ============================================================ */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const useCloud = !!(tg && tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast('6.9'));

if (tg) {
  tg.ready();
  tg.expand();
  applyTheme();
  tg.onEvent('themeChanged', applyTheme);
}
function applyTheme(){
  if (!tg) return;
  document.body.style.background = 'var(--bg)';
}
function haptic(kind){
  try{
    if (!tg || !tg.HapticFeedback) return;
    if (kind === 'start' || kind === 'tap') tg.HapticFeedback.impactOccurred('medium');
    else if (kind === 'ok') tg.HapticFeedback.notificationOccurred('success');
    else if (kind === 'warn') tg.HapticFeedback.notificationOccurred('warning');
  }catch(e){}
}

/* ============================================================
   Облачное хранилище Telegram (обёртки в промисы)
   ============================================================ */
function cloudGet(key){ return new Promise(r=>tg.CloudStorage.getItem(key,(e,v)=>r(e?null:v))); }
function cloudSet(key,val){ return new Promise(r=>tg.CloudStorage.setItem(key,val,(e,ok)=>r(!e&&ok))); }
function cloudRemove(key){ return new Promise(r=>tg.CloudStorage.removeItem(key,(e,ok)=>r(!e&&ok))); }
function cloudKeys(){ return new Promise(r=>tg.CloudStorage.getKeys((e,k)=>r(e?[]:(k||[])))); }
function cloudGetItems(keys){ return new Promise(r=>tg.CloudStorage.getItems(keys,(e,o)=>r(e?{}:(o||{})))); }

const DAY_PREFIX = 'd_';
const RUN_KEY = 'run';

/* ============================================================
   Состояние
   ============================================================ */
const state = {
  entries: [],   // {i, t, c:'k'|'n', s:сек, date:'YYYY-MM-DD', ts}
  running: null, // {t, c, acc:сек, since:ms|null, day:'YYYY-MM-DD'}
  plan: []       // {i, t, c} — запланированные задачи
};
let selectedCat = 'k';

/* ============================================================
   Даты и форматирование
   ============================================================ */
function fmtDate(d){
  return d.getFullYear() + '-' +
         String(d.getMonth()+1).padStart(2,'0') + '-' +
         String(d.getDate()).padStart(2,'0');
}
function todayStr(){ return fmtDate(new Date()); }
function weekStartStr(){
  const d = new Date();
  const back = (d.getDay() - 5 + 7) % 7;   // 5 = пятница
  d.setDate(d.getDate() - back);
  return fmtDate(d);
}
function monthStartStr(){
  const d = new Date();
  return fmtDate(new Date(d.getFullYear(), d.getMonth(), 1));
}
function pad(n){ return String(n).padStart(2,'0'); }
function fmtHMS(sec){
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return h + ':' + pad(m) + ':' + pad(s);
}
function fmtHM(sec){
  sec = Math.round(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60);
  return h + ':' + pad(m);
}
function decH(sec){ return (sec/3600).toFixed(1).replace('.', ','); }
function fmtChMin(sec){
  const totalMin = Math.round(sec / 60);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h + ' ч. ' + m + ' мин.';
}
function ruDate(s){ const p = s.split('-'); return p[2] + '.' + p[1] + '.' + p[0]; }
const MONTHS = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];

/* ============================================================
   Загрузка / сохранение
   ============================================================ */
async function loadAll(){
  if (useCloud){
    const keys = await cloudKeys();
    const dayKeys = keys.filter(k => k.indexOf(DAY_PREFIX) === 0);
    let entries = [];
    for (let i=0;i<dayKeys.length;i+=40){
      const obj = await cloudGetItems(dayKeys.slice(i,i+40));
      for (const k in obj){
        if (obj[k]){ try{ const a = JSON.parse(obj[k]); if (Array.isArray(a)) entries = entries.concat(a); }catch(e){} }
      }
    }
    const r = await cloudGet(RUN_KEY);
    state.running = r ? safeParse(r) : null;

    // Восстановление: если в облаке пусто, но осталась локальная копия — берём её и переносим в облако
    if (entries.length === 0){
      const local = safeParse(localStorage.getItem('tt:all')) || [];
      if (local.length){
        entries = local;
        state.entries = entries;
        const days = Array.from(new Set(entries.map(e => e.date)));
        for (const d of days){ await persistDay(d); }
      }
    }
    if (!state.running){
      const lr = safeParse(localStorage.getItem('tt:run'));
      if (lr) state.running = lr;
    }
    state.entries = entries;

    const p = await cloudGet('plan');
    state.plan = p ? (safeParse(p) || []) : [];
    if (state.plan.length === 0){
      const lp = safeParse(localStorage.getItem('tt:plan')) || [];
      if (lp.length){ state.plan = lp; await persistPlan(); }
    }
  } else {
    state.entries = safeParse(localStorage.getItem('tt:all')) || [];
    state.running = safeParse(localStorage.getItem('tt:run'));
    state.plan = safeParse(localStorage.getItem('tt:plan')) || [];
  }
}
function safeParse(s){ try{ return s ? JSON.parse(s) : null; }catch(e){ return null; } }

async function persistDay(date){
  const dayEntries = state.entries.filter(e => e.date === date);
  if (useCloud){
    if (dayEntries.length === 0) await cloudRemove(DAY_PREFIX + date);
    else await cloudSet(DAY_PREFIX + date, JSON.stringify(dayEntries));
  }
  try{ localStorage.setItem('tt:all', JSON.stringify(state.entries)); }catch(e){}
}
async function persistRunning(){
  if (state.running){
    const s = JSON.stringify(state.running);
    if (useCloud) await cloudSet(RUN_KEY, s);
    try{ localStorage.setItem('tt:run', s); }catch(e){}
  } else {
    if (useCloud) await cloudRemove(RUN_KEY);
    try{ localStorage.removeItem('tt:run'); }catch(e){}
  }
}
async function persistPlan(){
  const s = JSON.stringify(state.plan);
  if (useCloud) await cloudSet('plan', s);
  try{ localStorage.setItem('tt:plan', s); }catch(e){}
}

/* ============================================================
   Логика таймера
   ============================================================ */
function genId(){ return Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4); }
function currentElapsed(){
  if (!state.running) return 0;
  return state.running.acc + (state.running.since ? (Date.now() - state.running.since)/1000 : 0);
}
async function startTimer(mergeId){
  const task = document.getElementById('task').value.trim();
  state.running = { t: task, c: selectedCat, acc: 0, since: Date.now(), day: todayStr(), mergeId: mergeId || null };
  await persistRunning();
  haptic('start');
  renderAll();
}
async function pauseTimer(){
  if (state.running && state.running.since){
    state.running.acc += (Date.now() - state.running.since)/1000;
    state.running.since = null;
    await persistRunning();
  }
  haptic('tap'); renderControls(); renderTick();
}
async function resumeTimer(){
  if (state.running && !state.running.since){
    state.running.since = Date.now();
    await persistRunning();
  }
  haptic('tap'); renderControls(); renderTick();
}
async function stopTimer(){
  const total = currentElapsed();
  const r = state.running;
  state.running = null;
  await persistRunning();
  if (r && total >= 1){
    const add = Math.round(total);
    let merged = null;
    if (r.mergeId) merged = state.entries.find(x => x.i === r.mergeId);
    if (merged){
      merged.s += add;
      merged.ts = Date.now();
      await persistDay(merged.date);
    } else {
      state.entries.push({ i: genId(), t: (r.t || 'Без названия'), c: r.c, s: add, date: r.day, ts: Date.now() });
      await persistDay(r.day);
    }
  }
  haptic('ok');
  document.getElementById('task').value = '';
  renderAll();
}
async function continueEntry(id){
  if (state.running) { haptic('warn'); return; }   // сначала остановите текущий таймер
  const e = state.entries.find(x => x.i === id);
  if (!e) return;
  e.ts = Date.now();                                // поднимаем запись наверх списка
  await persistDay(e.date);
  document.getElementById('task').value = e.t || '';
  selectedCat = e.c;
  setCatUI(selectedCat);
  await startTimer(e.i);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
async function deleteEntry(id){
  const e = state.entries.find(x => x.i === id);
  if (!e) return;
  state.entries = state.entries.filter(x => x.i !== id);
  await persistDay(e.date);
  haptic('warn');
  renderAll();
}

/* ============================================================
   Подсчёт сумм
   ============================================================ */
function totals(from, to){
  let k = 0, n = 0;
  for (const e of state.entries){
    if (e.date >= from && e.date <= to){
      if (e.c === 'k') k += e.s; else n += e.s;
    }
  }
  if (state.running){
    const d = state.running.day;
    if (d >= from && d <= to){
      const el = currentElapsed();
      if (state.running.c === 'k') k += el; else n += el;
    }
  }
  return { k, n };
}

/* ============================================================
   Отрисовка
   ============================================================ */
const displayEl = document.getElementById('display');

function renderControls(){
  const run = state.running;
  const active = !!run;
  const ticking = !!(run && run.since);
  document.getElementById('btn-start').hidden  = active;
  document.getElementById('btn-pause').hidden  = !ticking;
  document.getElementById('btn-resume').hidden = !(active && !ticking);
  document.getElementById('btn-stop').hidden   = !active;

  // блокируем выбор категории во время сессии
  document.querySelectorAll('#timer-cats .cat').forEach(b => b.disabled = active);
  // подсвечиваем категорию активной сессии
  if (active){
    selectedCat = run.c;
    setCatUI(run.c);
    const taskEl = document.getElementById('task');
    if (document.activeElement !== taskEl) taskEl.value = run.t || '';
  }
  displayEl.className = 'display' + (active ? (run.c === 'k' ? ' run-k' : ' run-n') : '');
  renderTick();
}
function setCatUI(c){
  document.querySelectorAll('#timer-cats .cat').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
}
function renderTick(){
  displayEl.textContent = fmtHMS(currentElapsed());
}
function setBar(id, sec, normHours){
  const pct = normHours > 0 ? (sec / (normHours*3600)) * 100 : 0;
  const bar = document.getElementById(id);
  bar.querySelector('i').style.width = Math.min(pct, 100) + '%';
  bar.classList.toggle('over', pct >= 100);
}
function renderStats(){
  const t = totals(todayStr(), todayStr());
  const w = totals(weekStartStr(), todayStr());
  const m = totals(monthStartStr(), todayStr());

  document.getElementById('t-k').textContent = fmtHM(t.k);
  document.getElementById('t-n').textContent = fmtHM(t.n);
  document.getElementById('w-k').textContent = fmtHM(w.k);
  document.getElementById('w-n').textContent = fmtHM(w.n);
  document.getElementById('m-k').textContent = fmtHM(m.k);
  document.getElementById('m-n').textContent = fmtHM(m.n);

  setBar('bar-tk', t.k, NORM.COMM_DAY);
  setBar('bar-tn', t.n, NORM.NONCOMM_DAY);
  setBar('bar-mk', m.k, NORM.COMM_MONTH);

  document.getElementById('t-k-goal').textContent = '/ ' + NORM.COMM_DAY + ':00';
  document.getElementById('m-k-goal').textContent = '/ ' + NORM.COMM_MONTH + ':00';
}
function liveDurText(){
  if (!state.running) return '0:00:00';
  if (state.running.mergeId){
    const e = state.entries.find(x => x.i === state.running.mergeId);
    return fmtHMS((e ? e.s : 0) + currentElapsed());
  }
  return fmtHMS(currentElapsed());
}
function renderLog(){
  const log = document.getElementById('log');
  log.innerHTML = '';
  const today = todayStr();
  const run = state.running;
  const mergeId = run && run.mergeId;

  // отдельная строка «идёт» — только для новой задачи (не продолжение существующей)
  if (run && !mergeId){
    const row = document.createElement('div');
    row.className = 'entry live';
    row.innerHTML =
      '<span class="tag ' + run.c + '"></span>' +
      '<span class="task"></span>' +
      '<span class="dur" id="live-dur"></span>';
    row.querySelector('.task').textContent = (run.t || 'Без названия') + ' · идёт';
    row.querySelector('#live-dur').textContent = liveDurText();
    log.appendChild(row);
  }

  const items = state.entries.filter(e => e.date === today).sort((a,b) => (b.ts||0) - (a.ts||0));
  if (items.length === 0 && !run){
    log.innerHTML = '<div class="empty">Пока нет записей. Запустите таймер выше.</div>';
    return;
  }
  for (const e of items){
    const isLive = mergeId === e.i;
    const row = document.createElement('div');
    row.className = 'entry' + (isLive ? ' live' : '') + (run ? '' : ' tappable');
    row.innerHTML =
      '<span class="tag ' + e.c + '"></span>' +
      '<span class="task"></span>' +
      '<span class="dur"' + (isLive ? ' id="live-dur"' : '') + '></span>' +
      '<button class="del" aria-label="Удалить">×</button>';
    row.querySelector('.task').textContent = (e.t || 'Без названия') + (isLive ? ' · идёт' : '');
    row.querySelector('.dur').textContent = isLive ? liveDurText() : fmtHM(e.s);
    const del = row.querySelector('.del');
    del.addEventListener('click', (ev) => { ev.stopPropagation(); deleteEntry(e.i); });
    if (!run){
      row.addEventListener('click', () => continueEntry(e.i));
    }
    log.appendChild(row);
  }
}
function renderAll(){
  renderControls();
  renderStats();
  renderLog();
  renderPlan();
  renderHistory();
}

/* ---- Журнал по дням + правка задним числом ---- */
let histDate = null;          // выбранная дата (YYYY-MM-DD)
let editingId = null;         // id записи в режиме редактирования
let editCat = 'k';

function shiftHistDate(deltaDays){
  const p = histDate.split('-').map(Number);
  const d = new Date(p[0], p[1]-1, p[2]);
  d.setDate(d.getDate() + deltaDays);
  histDate = fmtDate(d);
  editingId = null;
  document.getElementById('hist-date').value = histDate;
  renderHistory();
}
async function saveEdit(id){
  const e = state.entries.find(x => x.i === id);
  if (!e) return;
  const h = parseInt(document.getElementById('he-h').value, 10) || 0;
  const m = parseInt(document.getElementById('he-m').value, 10) || 0;
  const sec = h*3600 + m*60;
  if (sec <= 0){ haptic('warn'); return; }
  e.t = document.getElementById('he-task').value.trim() || 'Без названия';
  e.c = editCat;
  e.s = sec;
  await persistDay(e.date);
  editingId = null;
  haptic('ok');
  renderAll();
}
function renderHistory(){
  if (!histDate) histDate = todayStr();
  const list = document.getElementById('hist-list');
  if (!list) return;
  list.innerHTML = '';

  const t = totals(histDate, histDate);
  document.getElementById('hist-total').textContent =
    'Коммерч. ' + fmtHM(t.k) + '  ·  Некоммерч. ' + fmtHM(t.n);

  const items = state.entries.filter(e => e.date === histDate).sort((a,b) => (b.ts||0) - (a.ts||0));
  if (items.length === 0){
    list.innerHTML = '<div class="hist-empty">Записей за этот день нет.</div>';
    return;
  }
  for (const e of items){
    if (editingId === e.i){
      const ed = document.createElement('div');
      ed.className = 'hist-edit';
      ed.innerHTML =
        '<input class="he-input" id="he-task" type="text" />' +
        '<div class="cat-toggle small" id="he-cats">' +
          '<button type="button" class="cat" data-cat="k">Коммерч.</button>' +
          '<button type="button" class="cat" data-cat="n">Некоммерч.</button>' +
        '</div>' +
        '<div class="he-time">' +
          '<input class="he-input" id="he-h" type="number" min="0" max="24" placeholder="ч" inputmode="numeric" />' +
          '<input class="he-input" id="he-m" type="number" min="0" max="59" placeholder="мин" inputmode="numeric" />' +
        '</div>' +
        '<div class="he-actions">' +
          '<button class="btn primary he-save">Сохранить</button>' +
          '<button class="btn ghost he-cancel">Отмена</button>' +
        '</div>';
      ed.querySelector('#he-task').value = e.t || '';
      const mm = Math.round(e.s/60);
      ed.querySelector('#he-h').value = Math.floor(mm/60);
      ed.querySelector('#he-m').value = mm % 60;
      editCat = e.c;
      ed.querySelectorAll('#he-cats .cat').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === editCat);
        b.addEventListener('click', () => {
          editCat = b.dataset.cat;
          ed.querySelectorAll('#he-cats .cat').forEach(x => x.classList.toggle('active', x === b));
        });
      });
      ed.querySelector('.he-save').addEventListener('click', () => saveEdit(e.i));
      ed.querySelector('.he-cancel').addEventListener('click', () => { editingId = null; renderHistory(); });
      list.appendChild(ed);
    } else {
      const row = document.createElement('div');
      row.className = 'entry';
      row.innerHTML =
        '<span class="tag ' + e.c + '"></span>' +
        '<span class="task"></span>' +
        '<span class="dur"></span>' +
        '<button class="edit" aria-label="Изменить">✎</button>' +
        '<button class="del" aria-label="Удалить">×</button>';
      row.querySelector('.task').textContent = e.t || 'Без названия';
      row.querySelector('.dur').textContent = fmtHM(e.s);
      row.querySelector('.edit').addEventListener('click', () => { editingId = e.i; renderHistory(); });
      row.querySelector('.del').addEventListener('click', () => deleteEntry(e.i));
      list.appendChild(row);
    }
  }
}

/* живой тик раз в секунду */
setInterval(() => {
  if (state.running && state.running.since){
    renderTick();
    renderStats();
    const live = document.getElementById('live-dur');
    if (live) live.textContent = liveDurText();
  }
}, 1000);

/* ============================================================
   Отчёт / выгрузка
   ============================================================ */
let reportPeriod = 'today';
let reportCat = 'all';

function rangeFor(period){
  const today = todayStr();
  if (period === 'today') return { from: today, to: today, label: ruDate(today) };
  if (period === 'week')  return { from: weekStartStr(), to: today, label: ruDate(weekStartStr()) + ' – ' + ruDate(today) };
  if (period === 'month') return { from: monthStartStr(), to: today, label: ruDate(monthStartStr()) + ' – ' + ruDate(today) };
  return { from: '0000-00-00', to: '9999-99-99', label: 'за всё время' };
}
function buildReport(){
  const { from, to, label } = rangeFor(reportPeriod);
  const comm = new Map(), non = new Map();
  for (const e of state.entries){
    if (e.date < from || e.date > to) continue;
    if (reportCat !== 'all' && e.c !== reportCat) continue;
    const t = e.t || 'Без названия';
    const map = e.c === 'k' ? comm : non;
    map.set(t, (map.get(t) || 0) + e.s);
  }

  function section(title, map){
    const rows = [...map.entries()].sort((a, b) => b[1] - a[1]);
    if (rows.length === 0) return '';
    let s = '\n' + title + '\n\n';
    let sum = 0;
    for (const [t, sec] of rows){ s += '* ' + t + ' | ' + fmtChMin(sec) + '\n'; sum += sec; }
    s += 'Итого: ' + fmtChMin(sum) + '\n';
    return s;
  }

  let out = 'Отчёт по часам (' + label + ')\n';
  if (reportCat !== 'n') out += section('Коммерческие', comm);
  if (reportCat !== 'k') out += section('Некоммерческие', non);
  if (comm.size === 0 && non.size === 0) out += '\nЗа выбранный период записей нет.';
  return out;
}
function showReport(){
  const txt = buildReport();
  const ta = document.getElementById('report');
  ta.value = txt;
  ta.classList.add('show');
  document.getElementById('report-actions').hidden = false;
  haptic('tap');
}
function copyReport(){
  const ta = document.getElementById('report');
  const text = ta.value;
  const done = () => {
    haptic('ok');
    const b = document.getElementById('btn-copy');
    const old = b.textContent; b.textContent = 'Скопировано ✓';
    setTimeout(() => b.textContent = old, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(ta, done));
  } else {
    fallbackCopy(ta, done);
  }
}
function fallbackCopy(ta, done){
  ta.removeAttribute('readonly');
  ta.focus(); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){}
  ta.setAttribute('readonly','');
  window.getSelection().removeAllRanges();
}

/* ============================================================
   Привязка событий
   ============================================================ */
document.querySelectorAll('#timer-cats .cat').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.running) return;
    selectedCat = btn.dataset.cat;
    setCatUI(selectedCat);
    haptic('tap');
  });
});

/* --- Добавить вручную --- */
let manualCat = 'k';
document.querySelectorAll('#manual-cats .cat').forEach(btn => {
  btn.addEventListener('click', () => {
    manualCat = btn.dataset.cat;
    document.querySelectorAll('#manual-cats .cat').forEach(x => x.classList.toggle('active', x === btn));
    haptic('tap');
  });
});
function flashBtn(id, msg, reset){
  const b = document.getElementById(id);
  b.textContent = msg;
  setTimeout(() => b.textContent = reset, 1500);
}
async function addManual(){
  const task = document.getElementById('m-task').value.trim();
  const date = document.getElementById('m-date').value || todayStr();
  const h = parseInt(document.getElementById('m-h').value, 10) || 0;
  const m = parseInt(document.getElementById('m-m').value, 10) || 0;
  const sec = h * 3600 + m * 60;
  if (sec <= 0){ haptic('warn'); flashBtn('btn-add-manual', 'Укажите время', 'Добавить запись'); return; }
  state.entries.push({ i: genId(), t: task || 'Без названия', c: manualCat, s: sec, date: date, ts: Date.now() });
  await persistDay(date);
  haptic('ok');
  document.getElementById('m-task').value = '';
  document.getElementById('m-h').value = '';
  document.getElementById('m-m').value = '';
  flashBtn('btn-add-manual', 'Добавлено ✓', 'Добавить запись');
  renderAll();
}
document.getElementById('btn-add-manual').addEventListener('click', addManual);

/* --- Планер задач --- */
let planCat = 'k';
document.querySelectorAll('#plan-cats .cat').forEach(btn => {
  btn.addEventListener('click', () => {
    planCat = btn.dataset.cat;
    document.querySelectorAll('#plan-cats .cat').forEach(x => x.classList.toggle('active', x === btn));
    haptic('tap');
  });
});
async function addPlan(){
  const t = document.getElementById('p-task').value.trim();
  if (!t){ haptic('warn'); flashBtn('btn-add-plan', 'Введите задачу', 'В планер'); return; }
  state.plan.push({ i: genId(), t: t, c: planCat });
  await persistPlan();
  document.getElementById('p-task').value = '';
  haptic('ok');
  renderPlan();
}
async function deletePlan(id){
  state.plan = state.plan.filter(p => p.i !== id);
  await persistPlan();
  haptic('warn');
  renderPlan();
}
async function startFromPlan(id){
  if (state.running) return;            // сначала остановите текущий таймер
  const p = state.plan.find(x => x.i === id);
  if (!p) return;
  document.getElementById('task').value = p.t;
  selectedCat = p.c;
  setCatUI(selectedCat);
  await startTimer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function renderPlan(){
  const list = document.getElementById('plan-list');
  list.innerHTML = '';
  if (!state.plan || state.plan.length === 0){
    list.innerHTML = '<div class="plan-empty">Список пуст. Запланируйте задачу выше.</div>';
    return;
  }
  for (const p of state.plan){
    const row = document.createElement('div');
    row.className = 'plan-item';
    row.innerHTML =
      '<span class="tag ' + p.c + '"></span>' +
      '<span class="task"></span>' +
      '<button class="run">Запустить</button>' +
      '<button class="del" aria-label="Удалить">×</button>';
    row.querySelector('.task').textContent = p.t;
    const runBtn = row.querySelector('.run');
    runBtn.disabled = !!state.running;
    runBtn.title = state.running ? 'Сначала остановите таймер' : 'Запустить по таймеру';
    runBtn.addEventListener('click', () => startFromPlan(p.i));
    row.querySelector('.del').addEventListener('click', () => deletePlan(p.i));
    list.appendChild(row);
  }
}
document.getElementById('btn-add-plan').addEventListener('click', addPlan);

document.getElementById('task').addEventListener('input', () => {
  if (state.running){
    state.running.t = document.getElementById('task').value.trim();
    persistRunning();
  }
});
document.getElementById('btn-start').addEventListener('click', () => startTimer());
document.getElementById('btn-pause').addEventListener('click', pauseTimer);
document.getElementById('btn-resume').addEventListener('click', resumeTimer);
document.getElementById('btn-stop').addEventListener('click', stopTimer);

document.querySelectorAll('#seg-period button').forEach(b => {
  b.addEventListener('click', () => {
    reportPeriod = b.dataset.p;
    document.querySelectorAll('#seg-period button').forEach(x => x.classList.toggle('on', x === b));
    if (!document.getElementById('report-actions').hidden) showReport();

});
document.querySelectorAll('#seg-cat button').forEach(b => {
  b.addEventListener('click', () => {
    reportCat = b.dataset.c;
    document.querySelectorAll('#seg-cat button').forEach(x => x.classList.toggle('on', x === b));
    if (!document.getElementById('report-actions').hidden) showReport();
  });
});
document.getElementById('btn-report').addEventListener('click', showReport);
document.getElementById('btn-copy').addEventListener('click', copyReport);

/* --- Навигация по дням истории --- */
document.getElementById('hist-prev').addEventListener('click', () => shiftHistDate(-1));
document.getElementById('hist-next').addEventListener('click', () => shiftHistDate(1));

if (navigator.share){
